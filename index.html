<!DOCTYPE html>
<html lang="zh-CN">
    <!-- V4.1:新增壁纸图片保存功能 -->
<head>
    <meta charset="UTF-8">
    <title>WL本地主页</title>
    <!-- 导入.CSS样式表 -->
    <!-- <link rel="stylesheet" href="styles.css"> -->
    <!-- 导入图标 -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">    
    <style>
        * {
            /* 所有元素的：外边距、内边距、盒尺寸包含内边距和边框 */
            margin: 0;  
            padding: 0;
            box-sizing: border-box;
        }
        
        /* 导入现代字体 */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        
        /* 页面加载动画 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(76, 175, 80, 0.3);
            border-radius: 50%;
            border-top-color: #4CAF50;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        body {
            /* 外链url图像，缩放图像适应背景 */
            /* background: url('https://picsum.photos/1920/1080') no-repeat center center fixed; */
            background-size: cover;         
            background-repeat: no-repeat;
            min-height: 100vh;      /* 设置最小高度为视口高度的100% */
            display: flex; /* 使body成为一个flex容器 */
            flex-direction: column; /* 主轴为垂直方向 */
            font-family: 'Poppins', Arial, sans-serif;
            font-size: 16px;
            /* background: #f0f2f5; */
            color: white;   /*默认文本色改为白色，更适合深色背景*/
            padding: 20px;    /* 内容与边框的距离 */
            transition: all 0.5s ease;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            /* 背景切换开关容器 */
            .switch-container {
                top: 10px;
                right: 10px;
                gap: 8px;
            }
            
            .switch {
                flex-direction: column;
                align-items: flex-end;
                gap: 5px;
            }
            
            .switch-label {
                margin-right: 0;
                font-size: 12px;
                padding: 4px 8px;
            }
        }
            /* 菜单栏(弃用) */
            .menu-bar{
                position: fixed;
                top:8px;
                left:10px;
                /* padding: 10px; */
                z-index: 10;
                display:flex;
                align-items: center;        /*垂直居中 */
                /* background: #333; */
            }
            /* 历史记录按键 */
        .hsButton{       /* Menu下的所有button元素选择器 */
            background-color: rgba(76, 175, 80, 0.4);
            box-shadow: 0 3px 6px rgba(76, 175, 80, 0.3);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-family: 'Poppins', Arial;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .hsButton:hover {
            background-color: rgba(76, 175, 80, 0.7);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(76, 175, 80, 0.4);
        }

            /* 背景切换开关样式 */
            /* 修改原有.switch样式，添加flex布局 */
            .switch-container {
                position: fixed;
                top: 20px;
                right: 20px;
                z-index: 9;
                display: flex;      
                gap:10px;
                flex-direction: column;
                align-items: flex-end; 
                    /* 纵向排列，右侧对齐 */
            }
            .switch {
                /* position: fixed;
                top: 20px;
                right: 20px; */
                /* z-index: 999; */
                display: flex;      
                align-items: center; 
            }
            .switch-label {
                margin-right: 10px;
                padding: 6px 12px;
                border-radius: 20px;
                background: rgba(0, 0, 0, 0.6);
                color: white;
                font: 500 13px 'Poppins', Arial;
                user-select: none; /* 防止文字被选中 */
                backdrop-filter: blur(5px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                transition: all 0.3s ease;
            }
            
            .switch-label:hover {
                background: rgba(76, 175, 80, 0.2);
                border-color: rgba(76, 175, 80, 0.4);
            }
            .toggle {
                opacity: 0; /* 不透明度 */
                position: absolute;
            }

            .toggle + label {
                display: block;
                position: relative;
                width: 60px;
                height: 34px;
                background-color: rgba(255, 255, 255, 0.2);
                border-radius: 34px;
                cursor: pointer;
                transition: all 0.4s ease;
                box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.1);
            }

            .toggle + label:before {
                content: "";
                position: absolute;
                top: 4px;
                left: 4px;
                width: 26px;
                height: 26px;
                background: white;
                border-radius: 50%;
                transition: all 0.4s ease;
                box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            }

            .toggle:checked + label {
                background-color: rgba(76, 175, 80, 0.8);
                box-shadow: inset 0 0 0 2px rgba(76, 175, 80, 0.5);
            }

            .toggle:checked + label:before {
                transform: translateX(26px);
                box-shadow: 0 2px 6px rgba(76, 175, 80, 0.4);
            }
            
            .toggle:focus + label {
                box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.3);
            }


        /* 一、时间日期容器*/
        .time-container {
            display: flex;
            flex-direction: column;
            justify-content: center;    /*弹性项排列：水平居中*/
            align-items: center;
            gap: 10px;
            margin-top: 60px;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 时间日期格式 */
        #time {
            font-size: clamp(2em, 5vw, 3.5em);     /*响应式字体大小*/
            font-weight: 300;
            padding: 15px 25px;
            background: rgba(4, 4, 4, 0.8);
            border-radius: 12px;
            color: #4CAF50;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        #date {
            font-size: clamp(1em, 3vw, 1.5em);
            padding: 10px 20px;
            background: rgba(4, 4, 4, 0.7);
            border-radius: 12px;
            color: #4CAF50;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .time-container {
                margin-top: 40px;
            }
            
            #time {
                padding: 10px 20px;
            }
            
            #date {
                padding: 8px 16px;
            }
        }

        /* 二、搜索栏容器 */
        .search-container {
            /*容器样式*/
            margin: 30px auto;
            width: 100%;
            max-width: 800px;
            padding: 20px;
            animation: slideUp 0.8s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 搜索表单:不添加样式没法控制子元素了！！ */
        #search-form {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .search-container {
                margin: 20px auto;
                padding: 10px;
            }
            
            #search-form {
                flex-direction: column;
                gap: 10px;
                padding: 10px;
            }
        }
        /* 搜索引擎选择框 */
        #search-engine {
            flex: 0 1 120px;
            height: 45px;
            padding: 0 15px;
            font-family: 'Poppins', Arial, sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            outline: none;
            transition: all 0.3s ease;
        }
        
        #search-engine:hover {
            border-color: #4CAF50;
            box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
        }
        
        /* 搜索输入框 */
        #search-input {
            flex: 1 1 auto;
            min-width: 100px;
            height: 45px;
            padding: 0 20px;
            font-family: 'Poppins', Arial, sans-serif;
            font-size: 14px;
            font-weight: 400;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            outline: none;
            transition: all 0.3s ease;
        }
        
        #search-input:focus {
            border-color: #4CAF50;
            box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
            background: white;
        }
        
        /* 搜索按钮 */
        #search-btn {
            font-family: 'Poppins', Arial, sans-serif;
            font-size: 14px;
            font-weight: 600;
            border: none;
            height: 45px;
            padding: 0 20px;
            border-radius: 10px;
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            #search-engine {
                width: 100%;
                max-width: none;
            }
            
            #search-input {
                width: 100%;
                max-width: none;
            }
            
            #search-btn {
                width: 100%;
                max-width: none;
            }
        }
        #search-btn:hover {
            background: linear-gradient(135deg, #45a049 0%, #4CAF50 100%);
            transform: translateY(-3px); /* 向上移动3px */
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.4); /* 添加阴影效果 */
        }
        #search-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.3) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: rotate(30deg);
            animation: wave 2s infinite;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #search-btn:hover::before {
            opacity: 1;
        }
        @keyframes wave {
            0% {
                transform: translateX(-100%) rotate(30deg);
            }
            100% {
                transform: translateX(100%) rotate(30deg);
            }
        }
        
        /* 为所有按钮添加统一的悬停效果 */
        button {
            position: relative;
            overflow: hidden;
        }
        
        button::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        button:hover::after {
            width: 300px;
            height: 300px;
        }

        /* 书签总容器 */
        .bookmarks {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
            margin: 50px auto;
            max-width: 1400px;
            padding: 0 20px;
            animation: fadeInUp 1s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 分类栏 */
        .category {
            min-width: 280px;
            max-width: 320px;
            padding: 20px;
            background: rgba(4, 4, 4, 0.7);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease-out forwards;
        }
        
        /* 为每个分类栏添加不同的动画延迟 */
        .category:nth-child(1) { animation-delay: 0.1s; }
        .category:nth-child(2) { animation-delay: 0.2s; }
        .category:nth-child(3) { animation-delay: 0.3s; }
        .category:nth-child(4) { animation-delay: 0.4s; }
        .category:nth-child(5) { animation-delay: 0.5s; }
        .category:nth-child(6) { animation-delay: 0.6s; }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .category:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .bookmarks {
                margin: 30px auto;
                padding: 0 10px;
                gap: 15px;
            }
            
            .category {
                min-width: 100%;
                max-width: 100%;
                padding: 15px;
            }
        }

        /* 后代选择器：分类栏内的h3 */
        .category h3 {
            color: #4CAF50;
            text-align: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(76, 175, 80, 0.5);
            font-size: 1.2em;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* 分类栏下的，链接样式 */
        .category a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px 15px 12px 40px;
            margin: 8px 0;
            border-radius: 8px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .category a::before {
            content: '→';
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

        .category a:hover {
            background: rgba(76, 175, 80, 0.3);
            transform: translateX(8px);
            border-color: rgba(76, 175, 80, 0.5);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.2);
        }

        .category a:hover::before {
            color: rgba(76, 175, 80, 1);
            transform: translateY(-50%) translateX(5px);
        }

        .error-message {
            color: #ff4444;
            text-align: center;
            margin: 20px;
            font-family: 'Poppins', Arial, sans-serif;
            font-size: 16px;
            font-weight: 500;
        }

        /* V4.1 保存必应每日壁纸 */
        .save-button {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            font-family: 'Poppins', Arial, sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .save-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }
        .save-button::after {
            content: "";
            /* 相对于按钮定位：上，左 */
            position: absolute;     
            top: -100%;
            left: -50%;
            /* 伪元素大小、颜色（闪光白）、位置（倾斜） */
            width: 20%;
            height: 300%;
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(30deg);
            /* 过度平滑 */
            transition: all 0.8s;
        }
        .save-button:hover::after {
            left: 130%;
            /* 悬停，则从伪元素的-50左，变化到130左 */
        }
        .notification {
            /* 位置设定：固定位置、初始隐藏在屏幕下方、水平居中 */
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
                /* 左边缘定位到父容器中心 */
                /* 相较自身，左侧偏移一半（则中心对齐父容器中心） */

            /* 视觉样式：边距、背景、边框、阴影、字体(复合参数) */
            padding: 15px 30px;
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);

            /* 层级动画 */
            z-index: 1000;     /* 通知显示在最表层 */      
            transition: all 0.5s ease;  
                 /* 所有属性平滑过渡 */ 
                 
            /* 字体：颜色、属性 */
            color: white;
            font-family: 'Poppins', Arial, sans-serif;
            font-size: 1rem;
            font-weight: 500;
        }
        
        .notification.show {
            bottom: 30px;
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        .bottom-info {
            position: fixed;
            background: rgba(0, 0, 0, 0.7);
            bottom: 20px;
            right: 20px;
            text-align: center;
            padding: 10px 20px;
            border-radius: 20px;
            font-family: 'Poppins', Arial, sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: rgba(235, 240, 237, 0.7);
            z-index: 10;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .bottom-info:hover {
            color: rgba(235, 240, 237, 1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .bottom-info {
                position: relative;
                bottom: auto;
                right: auto;
                margin: 20px auto;
                width: fit-content;
            }
        }

    </style>
    <!-- *************************************** 以上为CSS格式代码 *********************************************** -->
</head>

        <div class="loading-spinner"></div>
    </div>

     <div class="switch-container">

            <span class="switch-label">随机背景切换</span>
            <input type="checkbox" id="bgToggle" class="toggle">

        </div>
        <div class="switch">
            <span class="switch-label">必应每日壁纸</span>

        </div>
        <button id="SearchHistory_OnOff" class="hsButton">搜索历史开关</button>
        <div>
            <button id="saveButton" class="save-button">保存今日壁纸</button>

     </div>
    <!-- 菜单栏Menu -->

        <button id="SearchHistory_OnOff">搜索历史开关</button>

    <!--一、 时间日期显示 -->
    <div class="time-container">
        <div id="time"></div>

    </div>
    <!--三、 书签分栏容器 -->
    <div id="bookmarks-container" class="bookmarks"></div>
    <div id="error-message" class="error-message"></div>
    <!-- 四、底部通知与信息 -->
    <div class="bottom-info"> Designed by WangLi | 2026.02.02 V1.0 </div>
    <div id="notification" class="notification">
        选择路径保存壁纸
    </div>

   <!-- -------------------- 以下为JS动态代码 ------------------------- -->
    <script>

        const bookmarksData = [

            {
                "name": "GH首页常用",
                "links": [
                    {"title": "BiliBili", "url": "https://www.bilibili.com/"},

        /*********************** 功能函数  **************************/

        // 更新时间
        function updateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('time').textContent = now.toLocaleTimeString();
            document.getElementById('date').textContent = now.toLocaleDateString('zh-CN', options);
        }       

        // 搜索处理
        function handleSearch(event) {
            event.preventDefault();
            const query = document.getElementById('search-input').value.trim();
                // 获取搜索关键词并去除前后空格
            if (!query) return;

            const engine = document.getElementById('search-engine').value;
            const searchUrl = searchEngines[engine].url.replace('{query}', encodeURIComponent(query));
            window.location.href = searchUrl;
        }

        // 书签加载
        function loadBookmarks() {
            try {
                // 获取书签容器元素
                const container = document.getElementById('bookmarks-container');
                // 清空容器内容（避免重复加载）
                container.innerHTML = '';
                // 遍历每个书签分类
                bookmarksData.forEach(category => {
                    // 创建容器 div(分类栏.category)
                    const categoryDiv = document.createElement('div');
                    categoryDiv.className = 'category';
                      
                    // 使用模板字符串构建分类内容（难）
                    categoryDiv.innerHTML = `
                        <h3>${category.name}</h3>
                        ${category.links.map(link => `
                            <a href="${link.url}" target="_blank" 
                                title="${link.desc || ''}">
                                ${link.title}
                            </a>
                        `).join('')}
                    `;

                    // 将分类容器添加到主容器
                    container.appendChild(categoryDiv);
                });   
            } catch (error) {
                console.error('书签加载错误:', error);
                document.getElementById('error-message').textContent = 
                    '书签初始化失败，请检查数据结构是否正确';
            }
        }

            document.getElementById('search-form').addEventListener('submit', handleSearch);

        /*背景设置函数:
            ckbox1:     背景图是否更新           |id="bgToggle"
            checkbox2: 是否使用必应每日壁纸      |id="BingPicSet"
        */
        function bg_set(){
            /*根据ID获取元素*/
            const toggle1 = document.getElementById('bgToggle');
            const toggle2 = document.getElementById('BingPicSet');    //纯色背景check
            const body = document.body;

            // 读取本地存储设置
            const bgPure = localStorage.getItem('bgPure');
            const bgState = localStorage.getItem('bgState');
            const savedImageId = localStorage.getItem('imageId');

            // 初始化状态（默认开启图片模式）
            let isDynamicBg = bgState ? bgState === 'dynamic' : true;
            let isPureBg = bgPure ? bgPure==='pure' : false;
            /*逻辑表：
                存储中bgPure的值    isPureBg判断参数
                    null                0
                    pure                1
                    notpure             0
            */
            // 初始化checkbox状态
            toggle1.checked = isDynamicBg;
            toggle2.checked = isPureBg;


            // 内嵌函数：生成随机图片ID（1-1000之间的图片）
            function generateImageId() {
                return Math.floor(Math.random() * 1000) + 1;
            }
            // 内嵌函数：设置背景
            function applyBackground(imageId) {
                if(imageId==2000 || bgPure==='pure'){       //toggle2打开状态
                    // body.style.backgroundColor = '#f0f2f5';
                    body.style.background= `url(https://bing.biturl.top/?format=image&index=0) no-repeat center center fixed`;
                }else{
                    body.style.background = `url(https://picsum.photos/id/${imageId}/1920/1080) no-repeat center center fixed`;
                    body.style.backgroundSize = 'cover';
                }
            } 
            
            // 初始化背景
            if (isDynamicBg) {
                // 动态模式：生成新ID
                const newId = generateImageId();
                localStorage.setItem('imageId', newId);
                applyBackground(newId);
            } else {
                // 静态模式：使用存储的ID（如果没有则生成）
                const idToUse = savedImageId || generateImageId();
                applyBackground(idToUse);
            }
            
            // 事件监听：checkbox
            toggle1.addEventListener('change', function() {
                if (this.checked) {
                    // 开启动态模式：生成新ID并保存
                    const newId = generateImageId();
                    localStorage.setItem('imageId', newId);
                    localStorage.setItem('bgState', 'dynamic');
                    applyBackground(newId);
                } else {
                    // 关闭动态模式：保留当前ID
                    const currentId = localStorage.getItem('imageId');
                    localStorage.setItem('bgState', 'static');
                    applyBackground(currentId);
                }
            });
            //toggle2监听函数
            toggle2.addEventListener('change',function(){
                if(this.checked){
                    localStorage.setItem('bgPure', 'pure');
                    applyBackground(2000);
                }else{
                    localStorage.setItem('bgPure', 'notpure');
                }
            })
        }

        // #region V4.1 异步事件:保存壁纸
        /**
         * @brief   异步事件:保存给定url获取的壁纸 *******************************************
         * @param   图片的url
         */
         async function saveWallpaper() {

            //获取DOM元素引用
            const saveButton = document.getElementById('saveButton');         // 图片保存按钮
            const notification = document.getElementById('notification');     // 通知元素
           /**通过API获取最终图片的url
            * fetch向代理服务器发送请求，重新定向到真正壁纸URL
            * res.url属性包含最终URL，可用来提取图片信息+下载图片
           */
            const response = await fetch('https://bing.biturl.top/?format=image&index=0');  //向代理服务器发送请求
            // const response = await fetch('https://picsum.photos/1920/1080');  //向代理服务器发送请求
            const response_url = response.url;   // 获取真实的壁纸URL（处理重定向）
            const realUrl = await fetch(response_url);  //向真实壁纸URL发送请求！！

            try {
                // 将响应转换为Blob对象（二进制大对象）
                const blob = await realUrl.blob();
                // 创建可下载的URL
                const blobUrl = URL.createObjectURL(blob);
                
                // 从URL提取壁纸日期作为文件名
                const datePattern = /(\d{4}\d{2}\d{2})\.jpg/;
                const dateMatch = response_url.match(datePattern);
                
                // 生成文件名：如果提取到日期则使用，否则使用当前日期
                const filename = dateMatch && dateMatch[1] ? 
                `Bing-Wallpaper-${dateMatch[1]}.jpg` : 
                `Bing-Wallpaper-${new Date().toISOString().slice(0, 10).replace(/-/g, '')}.jpg`;
                
                // 创建虚拟链接元素用于触发下载
                const link = document.createElement('a');
                link.href = blobUrl;
                // 设置下载属性
                link.download = filename;
                // 触发下载
                link.click();
                
                // 清理创建的URL（防止内存泄漏）
                setTimeout(() => {
                    URL.revokeObjectURL(blobUrl);
                }, 100);
                
                // 显示成功通知：最后添加.show子属性，距底部30px
                notification.textContent = `壁纸已保存为: ${filename}`;
                notification.classList.add('show');
                
                // 3秒后自动隐藏通知
                setTimeout(() => {
                    notification.classList.remove('show');
                }, 3000);
                
            } catch (error) {
                console.error('保存壁纸失败:', error);
                showError(`保存失败: ${error.message}`);
            } 
        }
        // #endregion
        /*********************** 监听事件、程序启动  **************************/

        document.getElementById('SearchHistory_OnOff').addEventListener('click', HistorySet_Change);
        // 添加保存按钮点击事件监听器

        window.addEventListener('DOMContentLoaded', hideLoading); //隐藏加载动画
