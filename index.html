<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WangLi</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body {
            background: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 16px;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        .avatar {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .name {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #ffffff;
        }
        
        .tagline {
            font-size: 1rem;
            color: #888888;
            margin-bottom: 30px;
            font-weight: 300;
        }
        
        .description {
            font-size: 1rem;
            color: #b0b0b0;
            margin-bottom: 40px;
            line-height: 1.8;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }
        
        .link-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px 20px;
            text-decoration: none;
            color: #e0e0e0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
        }
        
        .link-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .link-icon {
            margin-right: 10px;
            font-size: 1.2rem;
        }
        
        .footer {
            font-size: 0.875rem;
            color: #666666;
            margin-top: auto;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }
            
            .avatar {
                font-size: 3rem;
            }
            
            .name {
                font-size: 1.5rem;
            }
            
            .description {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar">🏠</div>
        <h1 class="name">WangLi</h1>
        <p class="tagline">Just for fun</p>
        <p class="description">
            一名热爱编程和设计的学生，热衷于将所学到的知识、灵感付诸实践，
            包括但不限于编程、设计、视频内容创作。
        </p>
        
        <div class="links">
            <a href="https://www.bilibili.com/" class="link-item" target="_blank">
                <span class="link-icon">📺</span>
                BiliBili
            </a>
            <a href="https://www.yuque.com/dashboard/notes" class="link-item" target="_blank">
                <span class="link-icon">📝</span>
                语雀
            </a>
            <a href="https://dict.youdao.com/" class="link-item" target="_blank">
                <span class="link-icon">🌐</span>
                有道翻译
            </a>
            <a href="https://www.doubao.com/chat/" class="link-item" target="_blank">
                <span class="link-icon">🤖</span>
                豆包
            </a>
            <a href="https://github.com/" class="link-item" target="_blank">
                <span class="link-icon">💻</span>
                GitHub
            </a>
        </div>
        
        <footer class="footer">
            © 2025 WangLi. Made with ❤️
        </footer>
    </div>
</body>
</html>
